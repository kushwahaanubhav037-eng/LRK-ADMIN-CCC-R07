<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Admin Control | LRK Computer Institute</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --edu-blue: #1a73e8; --edu-dark: #0d47a1; --white: #ffffff; 
            --bg: #f0f4f8; --success: #2e7d32; --danger: #d32f2f;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; }

        /* 1. Login Overlay */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--edu-dark); display: flex; justify-content: center;
            align-items: center; z-index: 9999;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 20px;
            text-align: center; width: 90%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .login-card i { color: var(--edu-blue); font-size: 50px; margin-bottom: 20px; }
        .login-card input {
            width: 100%; padding: 15px; margin: 20px 0;
            border: 2px solid #eee; border-radius: 10px; font-size: 16px; text-align: center;
        }
        .login-card button {
            background: var(--edu-blue); color: white; border: none;
            padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%;
        }

        /* 2. Main Layout (PC Wide) */
        #mainAdminContent { display: none; }
        .container { width: 98%; max-width: 1600px; margin: auto; padding: 20px; box-sizing: border-box; }
        
        .header-bar { 
            background: white; padding: 15px 25px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px;
        }

        .main-grid { display: grid; grid-template-columns: 420px 1fr; gap: 25px; }

        /* 3. Form & Sidebar */
        .admin-box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); position: sticky; top: 20px; }
        .admin-box h4 { margin: 0 0 20px 0; color: var(--edu-dark); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #555; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #eef0f2; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        
        .grid-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .tf-btn { 
            background: #f1f3f4; border: 1px solid #ddd; padding: 10px; 
            border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold;
            width: 100%; margin-bottom: 15px; transition: 0.3s;
        }
        .tf-btn:hover { background: #e8eaed; }

        .btn-sync { 
            background: var(--edu-blue); color: white; border: none; padding: 15px; 
            width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-update { background: #f2994a; display: none; }

        /* 4. Table Area */
        .table-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .table-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #fff; border-bottom: 1px solid #eee; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fc; color: var(--edu-dark); padding: 15px; text-align: left; font-size: 12px; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f1f1; font-size: 13px; }
        
        .action-btns { display: flex; gap: 8px; }
        .act-btn { width: 35px; height: 35px; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .edit-btn { background: #e8f0fe; color: var(--edu-blue); }
        .del-btn { background: #fff0f0; color: var(--danger); }

        #toast { position: fixed; bottom: 30px; right: 30px; padding: 15px 30px; border-radius: 10px; color: white; display: none; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="login-card">
        <i class="fas fa-user-shield"></i>
        <h2>Admin Access</h2>
        <input type="password" id="passInp" placeholder="Enter Password">
        <button onclick="checkPass()">UNLOCK SYSTEM</button>
        <p id="errMsg" style="color:red; font-size:12px; margin-top:15px; display:none;">Galat Password! Dubara koshish karein.</p>
    </div>
</div>

<div id="mainAdminContent">
    <div id="toast"></div>
    <div class="container">
        
        <div class="header-bar">
            <h2 style="margin: 0; color: var(--edu-dark);"><i class="fas fa-database"></i> LRK MASTER CONTROL <span style="font-size: 12px; color: #999;">V2.3</span></h2>
            <button onclick="loadData()" style="background:var(--edu-blue); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;"><i class="fas fa-sync"></i> REFRESH CLOUD</button>
        </div>

        <div class="main-grid">
            <div class="admin-box">
                <h4 id="formTitle">Add Question</h4>
                <input type="hidden" id="editId">
                
                <button class="tf-btn" onclick="setTrueFalse()">
                    <i class="fas fa-toggle-on"></i> USE TRUE / FALSE MODE
                </button>

                <div class="input-group">
                    <label>QUESTION TEXT</label>
                    <textarea id="qTxt" rows="3" placeholder="Sawal likhein..."></textarea>
                </div>
                
                <div class="grid-options">
                    <div class="input-group"><label>OPTION A</label><input type="text" id="opA"></div>
                    <div class="input-group"><label>OPTION B</label><input type="text" id="opB"></div>
                    <div class="input-group"><label>OPTION C</label><input type="text" id="opC"></div>
                    <div class="input-group"><label>OPTION D</label><input type="text" id="opD"></div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>CORRECT ANS (KEY)</label>
                        <select id="correctAns">
                            <option value="A">A</option><option value="B">B</option>
                            <option value="C">C</option><option value="D">D</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>LEVEL (UNLIMITED)</label>
                        <input type="number" id="qLevel" value="1">
                    </div>
                </div>

                <button class="btn-sync" id="saveBtn" onclick="saveAction('save')">SAVE TO CLOUD</button>
                <button class="btn-sync btn-update" id="updateBtn" onclick="saveAction('update')">UPDATE QUESTION</button>
                <button id="cancelBtn" onclick="resetForm()" style="display:none; width:100%; background:none; border:none; color:var(--danger); margin-top:10px; cursor:pointer; font-size:12px;">Cancel Edit</button>
            </div>

            <div class="table-card">
                <div class="table-header">
                    <b>Cloud Database: <span id="qCount">0</span> Questions</b>
                    <input type="text" id="searchBox" onkeyup="filterData()" placeholder="Search questions..." style="padding:10px; border-radius:10px; border:1px solid #ddd; width:250px;">
                </div>
                <table>
                    <thead>
                        <tr>
                            <th width="80px">LEVEL</th>
                            <th>QUESTION DETAILS</th>
                            <th width="60px">KEY</th>
                            <th width="120px">ACTION</th>
                        </tr>
                    </thead>
                    <tbody id="adminTable">
                        <tr><td colspan="4" style="text-align:center; padding:50px; color:#999;">Fetching secure data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypq0a5mRG2pFLs63pyvoxgLz-9w4wPrLbCWI8dVL1VPqT4sX5Obh7f3dq0htjT3oDT/exec";
    const MASTER_PASS = "Ritesh kumar 07";
    let masterData = [];

    // 1. Password Security
    function checkPass() {
        const val = document.getElementById('passInp').value;
        if(val === MASTER_PASS) {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainAdminContent').style.display = 'block';
            loadData();
        } else {
            document.getElementById('errMsg').style.display = 'block';
        }
    }

    // 2. Load Data
    async function loadData() {
        try {
            const res = await fetch(SCRIPT_URL);
            const db = await res.json();
            masterData = db.questions && db.questions.length > 1 ? db.questions.slice(1) : [];
            renderUI(masterData);
        } catch (e) { showToast("Connection Error!", "danger"); }
    }

    // 3. Render Table
    function renderUI(data) {
        document.getElementById('qCount').innerText = data.length;
        const tbody = document.getElementById('adminTable');
        tbody.innerHTML = "";
        
        data.slice().reverse().forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span style="background:#f0f0f0; padding:4px 10px; border-radius:5px; font-weight:bold;">L-${row[7] || 1}</span></td>
                <td>
                    <div style="font-weight:600;">${row[1]}</div>
                    <div style="font-size:11px; color:#777;">A: ${row[2]} | B: ${row[3]} | C: ${row[4]} | D: ${row[5]}</div>
                </td>
                <td style="font-weight:bold; color:var(--edu-blue)">${row[6]}</td>
                <td>
                    <div class="action-btns">
                        <button class="act-btn edit-btn" onclick="editMode('${row[0]}')"><i class="fas fa-edit"></i></button>
                        <button class="act-btn del-btn" onclick="deleteItem('${row[0]}')"><i class="fas fa-trash"></i></button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 4. True/False Handler
    function setTrueFalse() {
        document.getElementById('opA').value = "True";
        document.getElementById('opB').value = "False";
        document.getElementById('opC').value = "-";
        document.getElementById('opD').value = "-";
        showToast("True/False Mode Set", "success");
    }

    // 5. Edit & Update Logic
    function editMode(id) {
        const item = masterData.find(r => r[0].toString() === id.toString());
        if(!item) return;

        document.getElementById('editId').value = item[0];
        document.getElementById('qTxt').value = item[1];
        document.getElementById('opA').value = item[2];
        document.getElementById('opB').value = item[3];
        document.getElementById('opC').value = item[4];
        document.getElementById('opD').value = item[5];
        document.getElementById('correctAns').value = item[6];
        document.getElementById('qLevel').value = item[7] || 1;

        document.getElementById('formTitle').innerText = "Edit Question";
        document.getElementById('saveBtn').style.display = "none";
        document.getElementById('updateBtn').style.display = "block";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0,0);
    }

    async function saveAction(mode) {
        const id = mode === 'update' ? document.getElementById('editId').value : Date.now().toString();
        const q = document.getElementById('qTxt').value.trim();
        if(!q) return showToast("Question text is required!", "danger");

        // UI Feedback
        showToast(mode === 'update' ? "Updating..." : "Saving...", "success");

        if(mode === 'update') {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'questions', action: 'delete', row: [id] }) });
        }

        const payload = {
            type: 'questions',
            action: 'save',
            row: [id, q, document.getElementById('opA').value, document.getElementById('opB').value, document.getElementById('opC').value, document.getElementById('opD').value, document.getElementById('correctAns').value, document.getElementById('qLevel').value]
        };

        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        resetForm();
        setTimeout(loadData, 1500);
    }

    // 6. Delete Logic
    async function deleteItem(id) {
        if(!confirm("Kya aap is sawal ko delete karna chahte hain?")) return;
        showToast("Deleting...", "danger");
        const payload = { type: 'questions', action: 'delete', row: [id.toString()] };
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        setTimeout(loadData, 1000);
    }

    function resetForm() {
        ['editId','qTxt','opA','opB','opC','opD'].forEach(i => document.getElementById(i).value = "");
        document.getElementById('qLevel').value = 1;
        document.getElementById('formTitle').innerText = "Add Question";
        document.getElementById('saveBtn').style.display = "block";
        document.getElementById('updateBtn').style.display = "none";
        document.getElementById('cancelBtn').style.display = "none";
    }

    function filterData() {
        const val = document.getElementById('searchBox').value.toLowerCase();
        const filtered = masterData.filter(r => r[1].toLowerCase().includes(val));
        renderUI(filtered);
    }

    function showToast(m, t) {
        const x = document.getElementById('toast');
        x.innerText = m; x.style.background = t === 'success' ? 'var(--success)' : 'var(--danger)';
        x.style.display = 'block'; setTimeout(() => x.style.display = 'none', 3000);
    }
</script>
</body>
</html>
