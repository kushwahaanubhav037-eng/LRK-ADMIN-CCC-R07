<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>R07 ELITE ADMIN | LRK INSTITUTE</title>
    <style>
        :root { --red: #ff0000; --dark: #050505; --glow: rgba(255, 0, 0, 0.6); }
        body { 
            margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden; position: relative;
        }
        /* Animated Background */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #000 25%, #0a0000 50%, #000 75%);
            background-size: 400% 400%; animation: matrix 15s infinite; z-index: -1;
        }
        @keyframes matrix { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .admin-card {
            max-width: 850px; margin: 40px auto; background: rgba(15, 15, 15, 0.9);
            border: 2px solid var(--red); border-radius: 20px; padding: 40px;
            box-shadow: 0 0 40px var(--glow); backdrop-filter: blur(10px);
        }
        h1 { text-align: center; color: var(--red); text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 10px var(--red); margin-bottom: 5px; }
        .inst-name { text-align: center; color: white; font-size: 14px; opacity: 0.8; margin-bottom: 30px; letter-spacing: 2px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full { grid-column: span 2; }
        
        textarea, input, select {
            width: 100%; padding: 15px; background: #000; border: 1px solid #333;
            color: #fff; border-radius: 10px; font-size: 16px; outline: none; transition: 0.4s;
        }
        textarea:focus, input:focus { border-color: var(--red); box-shadow: 0 0 15px var(--red); }
        
        .btn-deploy {
            width: 100%; padding: 18px; margin-top: 25px; border: none; border-radius: 12px;
            background: var(--red); color: white; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 3px; font-size: 18px; transition: 0.3s;
        }
        .btn-deploy:hover { transform: translateY(-3px); box-shadow: 0 0 30px var(--red); }

        table { width: 100%; margin-top: 40px; border-collapse: collapse; border-radius: 10px; overflow: hidden; }
        th { background: var(--red); color: white; padding: 15px; font-size: 12px; text-transform: uppercase; }
        td { background: rgba(0,0,0,0.5); padding: 15px; border-bottom: 1px solid #222; text-align: center; }
        .loader { display: none; text-align: center; color: var(--red); font-weight: bold; margin-top: 10px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="admin-card">
        <h1>R07 PRO ADMIN</h1>
        <div class="inst-name">LRK COMPUTER INSTITUTE - MIHINPURWA</div>
        
        <div class="grid">
            <div class="full">
                <textarea id="qText" rows="3" placeholder="Enter Question Here..."></textarea>
            </div>
            <input type="text" id="opA" placeholder="Option A">
            <input type="text" id="opB" placeholder="Option B">
            <input type="text" id="opC" placeholder="Option C">
            <input type="text" id="opD" placeholder="Option D">
            <div class="full">
                <select id="ans">
                    <option value="A">CORRECT: A</option>
                    <option value="B">CORRECT: B</option>
                    <option value="C">CORRECT: C</option>
                    <option value="D">CORRECT: D</option>
                </select>
            </div>
        </div>
        <button class="btn-deploy" onclick="saveToCloud()" id="mainBtn">SYNC TO GOOGLE CLOUD</button>
        <div id="loader" class="loader">UPLOADING DATA TO SERVER...</div>

        <div id="qList"></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzIArbfM8Z1rWkGh8OpJMbSrdGN7Fenh3ffG8jX_WeGKuuSwG6P-hFMkWqF_wOD-6fS/exec";

        async function saveToCloud() {
            const q = document.getElementById('qText').value;
            if(!q) return alert("Empty fields not allowed!");

            const data = {
                type: 'quest',
                row: [Date.now(), q, document.getElementById('opA').value, document.getElementById('opB').value, 
                      document.getElementById('opC').value, document.getElementById('opD').value, document.getElementById('ans').value]
            };
            
            document.getElementById('loader').style.display = "block";
            document.getElementById('mainBtn').disabled = true;

            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("R07 SYSTEM: DATA DEPLOYED SUCCESSFULLY!");
            location.reload();
        }

        async function loadQs() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                let html = `<table><tr><th>#</th><th>Sawal (English)</th><th>Ans</th></tr>`;
                data.questions.slice(1).reverse().forEach((x, i) => {
                    html += `<tr><td>${i+1}</td><td style="text-align:left">${x[1]}</td><td style="color:red; font-weight:bold;">${x[6]}</td></tr>`;
                });
                document.getElementById('qList').innerHTML = html + `</table>`;
            } catch(e) { console.log("Connecting..."); }
        }
        loadQs();
    </script>
</body>
</html>
